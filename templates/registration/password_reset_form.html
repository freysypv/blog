{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Password reset{% endblock %}

{% block content %}
<div class="container-fluid bg-secondary-subtle min-vh-100 py-5">
    <h1>Password reset</h1>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-danger">Reset password</button>
    </form>
</div>
{% endblock %}
