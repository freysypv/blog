{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
    Change Password
{% endblock %}

{% block content %}
    <body class="bg-secondary-subtle">
        <h1>Password Change</h1>
        <p>Please enter your old password for security purposes, then enter your new password twice to verify.</p>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-secondary">Change password</button>
        </form>
    </body>
{% endblock %}
