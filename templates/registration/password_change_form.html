{% extends  'base.html' %}
{% load crispy_forms_tags %}
    


{% block title %}
    Change Password
{% endblock %}

{% block context %}
     <h1>Password Change</h1>
     <p>Please enter your old Password, for security's sake, and then enter your new passord twice so we can verify</p>
     <form method="post">
        {% csrf_token %}
        {{form|crispy}}
         
        <input type="submit" value="Change password" class="btn btn-secondary">
     </form>
{% endblock %}
