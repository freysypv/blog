{% extends "base.html" %}

{% block title %}
  Home
{% endblock %}



{% block content %}
  <body class="bg-secondary">
   
    <div class="card m-2 p-2 w-85 ">
        <h1 class="">Welcome to the Home Page</h1>
        <img src="https://plus.unsplash.com/premium_photo-1683309565422-77818a287060?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="img-fluid" alt="...">
        <h1>Latest Posts</h1>
        {% for post in posts %}
            <div class="post">
                <h2>{{ post.title}}</h2>
                <p>{{ post.content|truncatewords:20 }}</p>
            </div>
            {% endfor %}
    </div>

    <img src="https://images.unsplash.com/photo-1488190211105-8b0e65b80b4e?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8YmxvZ3xlbnwwfHwwfHx8MA%3D%3D" class="img-fluid" alt="...">

  </body>
    



   
  
{% endblock %}
