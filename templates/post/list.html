{% extends 'base.html' %}

{% block title %}
    Posts
{% endblock %}

{% block content %}
    <h1>All Posts</h1>
    <div>
        <ul>
            {% for post in posts %}
                <li>{{post.id}} - {{ post.title}}</li>
                <a href="{% url 'post_detail' post.id %}">Continue Reading</a>
            {% endfor %}

        </ul>
    </div>
{% endblock %}
