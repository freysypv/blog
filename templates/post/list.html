{% extends 'base.html' %}

{% block title %}
    Posts
{% endblock %}

{% block content %}
    <div class="card p-2 m-2">
        <h1 class="text-center">All Posts</h1>
        
    
        <ul>
            {% for post in posts %}
                <li>{{post.id}} - {{ post.title}}</li>
                <a href="{% url 'post_detail' post.id %}">Continue Reading</a>
            {% endfor %}

        </ul>
    
    </div>
{% endblock %}
